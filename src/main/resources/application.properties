spring.application.name=dianping-demo

# ???????
server.port=8081

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true

# Redis connection
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
# spring.data.redis.password=your_password_if_needed
spring.data.redis.database=0
spring.data.redis.timeout=5s

# Store HttpSession in Redis
spring.session.store-type=redis
# Session timeout (optional, default is usually 30m)
server.servlet.session.timeout=30m

# Optional: cleaner namespace for keys
spring.session.redis.namespace=dianping:session